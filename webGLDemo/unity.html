<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unity Loader</title>
    <style>
        :root {
            --bg: #060708;
            --accent: #c8b08a;
            --track: rgba(255, 255, 255, 0.12);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(1200px 700px at 60% 20%, rgba(200, 176, 138, 0.08) 0%, rgba(6, 7, 8, 0) 60%), var(--bg);
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #unity-loading-bar {
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 18px;
            height: 8px;
        }

        #progress-container {
            width: 100%;
            height: 100%;
            background: var(--track);
            border-radius: 999px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 999px;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="progress-container">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var canvas = document.getElementById('unity-canvas');
            var buildUrl = 'Build/NewHouseData/';

            // Inject the Unity loader script
            var script = document.createElement('script');
            script.src = buildUrl + '/V3.loader.js';
            script.onload = function () {
                createUnityInstance(canvas, {
                    dataUrl: buildUrl + '/V3.data.unityweb',
                    frameworkUrl: buildUrl + '/V3.framework.js.unityweb',
                    codeUrl: buildUrl + '/V3.wasm.unityweb',
                    streamingAssetsUrl: 'StreamingAssets',
                    companyName: 'RazelTech',
                    productName: 'Unity_Painter',
                    productVersion: '1.0',
                    captureAllKeyboardInput: true
                }, function (progress) {
                    var bar = document.getElementById('unity-progress-bar-full');
                    if (bar) bar.style.width = (100 * progress) + '%';
                    try { parent.postMessage({ type: 'FromUnity', action: 'UnityLoadingProgress', progress: progress }, '*'); } catch (e) { }
                }).then(function (instance) {
                    // Hide loading bar
                    var loading = document.getElementById('unity-loading-bar');
                    if (loading) loading.style.display = 'none';

                    // Notify parent that Unity is ready.
                    // By this point C# Start() has already fired, so InitJSBridge()
                    // has registered the message listener — parent can flush its queue now.
                    try { parent.postMessage({ type: 'FromUnity', action: 'UnityReady' }, '*'); } catch (e) { }

                }).catch(function (err) {
                    console.error('[unity.html] Unity instance failed to load:', err);
                });
            };
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
